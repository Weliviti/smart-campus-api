name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Maven verify on JDK ${{ matrix.java }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [11, 17]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Show Maven & Java versions
        run: |
          mvn -v
          java -version

      - name: Build and test
        run: mvn -B -ntp -q verify

      - name: Upload fat JAR
        if: matrix.java == 11
        uses: actions/upload-artifact@v4
        with:
          name: smart-campus-api-jar
          path: target/smart-campus-api.jar
          if-no-files-found: error
