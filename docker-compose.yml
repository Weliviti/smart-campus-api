version: "3.9"

services:
  api:
    build: .
    image: smart-campus-api:local
    container_name: smart-campus-api
    ports:
      - "8080:8080"
    environment:
      JAVA_OPTS: "-Dserver.port=8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/"]
      interval: 10s
      timeout: 3s
      retries: 5
